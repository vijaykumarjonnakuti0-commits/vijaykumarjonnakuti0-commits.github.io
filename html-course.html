 <!DOCTYPE html>

    <div class="content-container">
        <h1>HTML అంటే ఏమిటి?</h1>
        <p>HTML అంటే HyperText Markup Language. ఇది వెబ్‌సైట్ నిర్మాణానికి ఉపయోగించే పునాది.</p>
        
        <h3>ముఖ్యమైన ట్యాగులు:</h3>
        <ul>
            <li><code>&lt;h1&gt;</code> - హెడ్డింగ్ కోసం</li>
            <li><code>&lt;p&gt;</code> - పేరాగ్రాఫ్ కోసం</li>
            <li><code>&lt;a&gt;</code> - లింక్ కోసం</li>
        </ul>
        
        <a href="index.html" class="btn">Back to Home</a>
    </div>
