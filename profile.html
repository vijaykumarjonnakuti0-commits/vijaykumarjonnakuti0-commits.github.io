<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vijay Kumar - Developer Profile</title>
    <style>
        body {
            background: #0b0f19;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .profile-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 20px;
            padding: 35px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #00ffcc;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        h1 {
            font-size: 26px;
            margin: 10px 0 5px 0;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .title {
            color: #00ffcc;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .bio {
            font-size: 15px;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .social-btn {
            display: inline-block;
            background: linear-gradient(135deg, #e1306c, #c13584);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(225, 48, 108, 0.3);
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(225, 48, 108, 0.5);
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- ఇక్కడ మీ ప్రొఫైల్ ఇమేజ్ లింక్ లేదా పేరు పెట్టుకోవచ్చు -->
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" alt="Vijay Kumar" class="profile-img">
        
        <h1>Vijay Kumar</h1>
        <div class="title">Full Stack Developer</div>
        
        <p class="bio">
            నమస్తే! నేను ఒక వెబ్ డెవలపర్‌ని. స్టూడెంట్స్ కోసం సరికొత్త మరియు ఈజీ కోడింగ్ ప్రాజెక్ట్స్ బిల్డ్ చేయడం నా ప్యాషన్.
        </p>
        
        <!-- మీ ఇన్‌స్టా కనెక్ట్ బటన్ -->
        <a href="https://instagram.com/vij_ay_the_ro_y_al" target="_blank" class="social-btn">
            Connect on Instagram
        </a>
        
        <a href="index.html" class="back-link">← Back to Website</a>

</body>
</html>
